<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录 - PorSavor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2E7D32;
            --primary-light: #4CAF50;
            --primary-dark: #1B5E20;
            --accent: #FF6B35;
            --bg-light: #F5F7FA;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body { 
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; 
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%); 
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .login-container {
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            overflow: hidden;
            display: flex;
            max-width: 900px;
            width: 90%;
        }

        .login-banner {
            width: 350px;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            padding: 60px 40px;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            color: white;
            text-align: center;
        }
        .login-banner-icon {
            font-size: 80px;
            margin-bottom: 30px;
        }
        .login-banner h1 {
            font-size: 28px;
            margin-bottom: 15px;
        }
        .login-banner p {
            opacity: 0.9;
            line-height: 1.8;
        }
        .login-banner-features {
            margin-top: 40px;
            text-align: left;
        }
        .login-banner-features li {
            list-style: none;
            padding: 10px 0;
            display: flex;
            align-items: center;
            gap: 12px;
        }
        .login-banner-features i {
            width: 30px;
            height: 30px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 14px;
        }

        .login-form-section {
            flex: 1;
            padding: 60px 50px;
        }
        .form-header {
            margin-bottom: 40px;
        }
        .form-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 24px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
        }
        .form-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--text-dark);
            margin-bottom: 8px;
        }
        .form-subtitle {
            color: var(--text-gray);
        }

        .form-group {
            margin-bottom: 25px;
        }
        .form-group label {
            display: block;
            font-weight: 500;
            margin-bottom: 10px;
            color: var(--text-dark);
        }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 18px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
            font-size: 18px;
        }
        .form-input {
            width: 100%;
            padding: 18px 18px 18px 50px;
            border: 2px solid #eee;
            border-radius: 14px;
            font-size: 16px;
            transition: all 0.3s;
        }
        .form-input:focus {
            outline: none;
            border-color: var(--primary);
            box-shadow: 0 0 0 4px rgba(46, 125, 50, 0.1);
        }
        .form-input::placeholder {
            color: #aaa;
        }

        .remember-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 30px;
        }
        .remember-me {
            display: flex;
            align-items: center;
            gap: 10px;
            cursor: pointer;
            color: var(--text-gray);
        }
        .remember-me input {
            width: 20px;
            height: 20px;
            accent-color: var(--primary);
        }

        .btn {
            width: 100%;
            padding: 18px;
            border-radius: 14px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
        }
        .btn-primary {
            background: var(--primary);
            color: var(--white);
        }
        .btn-primary:hover {
            background: var(--primary-dark);
            transform: translateY(-2px);
            box-shadow: 0 8px 25px rgba(46, 125, 50, 0.3);
        }
        .btn-primary:active {
            transform: translateY(0);
        }

        .back-link {
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
            margin-top: 30px;
            color: var(--text-gray);
            text-decoration: none;
            font-size: 14px;
        }
        .back-link:hover {
            color: var(--primary);
        }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 18px 28px;
            border-radius: 14px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
            display: flex;
            align-items: center;
            gap: 12px;
            box-shadow: 0 8px 30px rgba(0,0,0,0.2);
        }
        .toast.success { background: var(--primary); }
        .toast.error { background: #f44336; }
        .toast.warning { background: #ff9800; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .security-notice {
            margin-top: 30px;
            padding: 15px;
            background: #fff3e0;
            border-radius: 12px;
            font-size: 13px;
            color: #e65100;
            display: flex;
            align-items: flex-start;
            gap: 10px;
        }
        .security-notice i {
            margin-top: 2px;
        }

        @media (max-width: 768px) {
            .login-banner { display: none; }
            .login-form-section { padding: 40px 30px; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div class="login-banner-icon">🛡️</div>
            <h1>MemSavor 管理后台</h1>
            <p>专业的登山平台管理系统<br>安全、高效、便捷</p>
            <ul class="login-banner-features">
                <li><i class="fas fa-check"></i> 数据实时同步</li>
                <li><i class="fas fa-check"></i> 多维度数据分析</li>
                <li><i class="fas fa-check"></i> 安全权限管理</li>
                <li><i class="fas fa-check"></i> 操作日志追踪</li>
            </ul>
        </div>

        <div class="login-form-section">
            <div class="form-header">
                <div class="form-logo">
                    <span>⛰️</span>
                    <span>MemSavor Admin</span>
                </div>
                <h2 class="form-title">管理员登录</h2>
                <p class="form-subtitle">请使用管理员账号登录系统</p>
            </div>

            <form id="adminLoginForm" onsubmit="handleAdminLogin(event)">
                <div class="form-group">
                    <label>管理员账号</label>
                    <div class="input-wrapper">
                        <i class="fas fa-user-shield"></i>
                        <input type="text" class="form-input" id="adminAccount" placeholder="请输入管理员账号" required>
                    </div>
                </div>
                <div class="form-group">
                    <label>登录密码</label>
                    <div class="input-wrapper">
                        <i class="fas fa-lock"></i>
                        <input type="password" class="form-input" id="adminPassword" placeholder="请输入密码" required>
                    </div>
                </div>
                <div class="remember-row">
                    <label class="remember-me">
                        <input type="checkbox" id="rememberAdmin">
                        <span>记住账号</span>
                    </label>
                </div>
                <button type="submit" class="btn btn-primary">
                    <i class="fas fa-sign-in-alt"></i>
                    <span>安全登录</span>
                </button>
            </form>

            <div class="security-notice">
                <i class="fas fa-shield-alt"></i>
                <div>
                    <strong>安全提示：</strong>请勿在公共电脑上保存登录信息，使用完毕请及时退出登录。
                </div>
            </div>

            <a href="index.html" class="back-link">
                <i class="fas fa-arrow-left"></i>
                <span>返回前台首页</span>
            </a>
        </div>
    </div>

    <script src="js/api.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.innerHTML = `<i class="fas fa-${type === 'success' ? 'check-circle' : type === 'error' ? 'times-circle' : 'exclamation-circle'}"></i><span>${message}</span>`;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        async function handleAdminLogin(e) {
            e.preventDefault();
            
            const account = document.getElementById('adminAccount').value.trim();
            const password = document.getElementById('adminPassword').value;
            const remember = document.getElementById('rememberAdmin').checked;
            
            if (!account || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            try {
                const result = await api.adminLogin(account, password);
                if (result.success) {
                    if (remember) {
                        localStorage.setItem('rememberedAdmin', account);
                    } else {
                        localStorage.removeItem('rememberedAdmin');
                    }
                    
                    showToast('登录成功，正在跳转...', 'success');
                    
                    setTimeout(() => {
                        window.location.href = 'admin.html';
                    }, 1000);
                }
            } catch (error) {
                showToast(error.message || '登录失败', 'error');
            }
        }

        const remembered = localStorage.getItem('rememberedAdmin');
        if (remembered) {
            document.getElementById('adminAccount').value = remembered;
            document.getElementById('rememberAdmin').checked = true;
        }

        document.getElementById('adminPassword').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('adminLoginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
