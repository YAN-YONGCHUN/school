name = "memsavor-api"
main = "worker.js"
compatibility_date = "2024-01-01"

[vars]
ENVIRONMENT = "production"

[[kv_namespaces]]
binding = "DB"
id = "your-kv-namespace-id"

[site]
bucket = "./public"

[build]
command = "npm run build"

[build.upload]
format = "modules"
dir = "./src"
main = "./worker.js"
