<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>API测试 - MemSavor</title>
    <style>
        body { font-family: Arial, sans-serif; max-width: 800px; margin: 50px auto; padding: 20px; }
        .test-item { margin: 20px 0; padding: 15px; border: 1px solid #ddd; border-radius: 8px; }
        .success { background: #d4edda; border-color: #28a745; }
        .error { background: #f8d7da; border-color: #dc3545; }
        button { padding: 10px 20px; margin: 5px; cursor: pointer; }
        pre { background: #f5f5f5; padding: 10px; border-radius: 4px; overflow-x: auto; }
    </style>
</head>
<body>
    <h1>🧪 API 测试页面</h1>
    
    <div class="test-item">
        <h3>1. 测试山峰API</h3>
        <button onclick="testMountains()">获取山峰列表</button>
        <div id="mountains-result"></div>
    </div>
    
    <div class="test-item">
        <h3>2. 测试用户注册</h3>
        <input type="text" id="regName" placeholder="用户名" value="测试用户">
        <input type="text" id="regPhone" placeholder="手机号" value="13800138002">
        <input type="password" id="regPassword" placeholder="密码" value="123456">
        <button onclick="testRegister()">注册</button>
        <div id="register-result"></div>
    </div>
    
    <div class="test-item">
        <h3>3. 测试用户登录</h3>
        <input type="text" id="loginAccount" placeholder="账号" value="13800138002">
        <input type="password" id="loginPassword" placeholder="密码" value="123456">
        <button onclick="testLogin()">登录</button>
        <div id="login-result"></div>
    </div>

    <script>
        const API_BASE = 'https://lvxing-pi.vercel.app';
        
        async function testMountains() {
            const resultDiv = document.getElementById('mountains-result');
            resultDiv.innerHTML = '加载中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/mountains`);
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<pre>${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<pre>错误：${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<pre>请求失败：${error.message}</pre>`;
            }
        }
        
        async function testRegister() {
            const resultDiv = document.getElementById('register-result');
            const name = document.getElementById('regName').value;
            const phone = document.getElementById('regPhone').value;
            const password = document.getElementById('regPassword').value;
            
            resultDiv.innerHTML = '注册中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/register`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ name, phone, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<pre>注册成功！${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<pre>错误：${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<pre>请求失败：${error.message}</pre>`;
            }
        }
        
        async function testLogin() {
            const resultDiv = document.getElementById('login-result');
            const account = document.getElementById('loginAccount').value;
            const password = document.getElementById('loginPassword').value;
            
            resultDiv.innerHTML = '登录中...';
            
            try {
                const response = await fetch(`${API_BASE}/api/auth/login`, {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify({ account, password })
                });
                const data = await response.json();
                
                if (data.success) {
                    resultDiv.className = 'success';
                    resultDiv.innerHTML = `<pre>登录成功！${JSON.stringify(data, null, 2)}</pre>`;
                } else {
                    resultDiv.className = 'error';
                    resultDiv.innerHTML = `<pre>错误：${JSON.stringify(data, null, 2)}</pre>`;
                }
            } catch (error) {
                resultDiv.className = 'error';
                resultDiv.innerHTML = `<pre>请求失败：${error.message}</pre>`;
            }
        }
    </script>
</body>
</html>
