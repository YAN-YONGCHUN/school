<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录注册 | 攀峰计划</title>
    <link rel="stylesheet" href="css/site.css">
    <script defer src="js/site-data.js"></script>
    <script defer src="js/site-store.js"></script>
    <script defer src="js/site-ui.js"></script>
</head>
<body data-page="auth">
    <div class="site-shell">
        <header class="topbar">
            <div class="topbar-inner">
                <a class="brand" href="index.html">
                    <span class="brand-mark"><span data-logo-text></span></span>
                    <span class="brand-text">
                        <strong data-brand-name></strong>
                        <span data-brand-subtitle></span>
                    </span>
                </a>
                <button class="nav-toggle" type="button" aria-label="切换导航">☰</button>
                <nav class="nav-links">
                    <a data-link href="index.html">首页</a>
                    <a data-link href="detail.html">学科全景</a>
                    <a data-link href="community.html">创新社区</a>
                    <a data-link href="login.html">登录注册</a>
                    <a class="nav-cta" data-link href="account.html">账户中心</a>
                </nav>
                <div class="nav-extras" data-auth-area></div>
            </div>
        </header>

        <main class="page">
            <section class="hero">
                <div class="hero-grid">
                    <div>
                        <span class="eyebrow">Auth System</span>
                        <h1>现在，它不只是一个展示站。</h1>
                        <p class="lead">本站已加入纯前端账户系统，支持登录、注册和账户中心展示，让整站更像完整产品，也更适合比赛答辩演示。</p>
                        <div class="pill-row">
                            <span>演示账号：demo@campus.edu.cn</span>
                            <span>演示密码：123456</span>
                        </div>
                    </div>
                    <aside class="hero-panel">
                        <h2>系统亮点</h2>
                        <ul class="bullet-list">
                            <li>纯前端本地账户注册与登录</li>
                            <li>登录后可进入账户中心</li>
                            <li>社区报名会与账户信息联动</li>
                        </ul>
                    </aside>
                </div>
            </section>

            <section class="section auth-shell">
                <div class="form-card">
                    <div class="section-header">
                        <div>
                            <span class="section-label">Login</span>
                            <h2>账号登录</h2>
                            <p>支持使用邮箱或学号登录。</p>
                        </div>
                    </div>
                    <form id="login-form">
                        <div class="field">
                            <label for="account">邮箱 / 学号</label>
                            <input id="account" name="account" placeholder="请输入邮箱或学号" required>
                        </div>
                        <div class="field">
                            <label for="password">密码</label>
                            <input id="password" name="password" type="password" placeholder="请输入密码" required>
                        </div>
                        <div class="submit-row">
                            <button class="button button-primary" type="submit">立即登录</button>
                            <span id="login-status" class="status-note">登录后可进入账户中心与社区页面。</span>
                        </div>
                    </form>
                </div>

                <div class="form-card">
                    <div class="section-header">
                        <div>
                            <span class="section-label">Register</span>
                            <h2>创建账户</h2>
                            <p>注册成功后会自动登录。</p>
                        </div>
                    </div>
                    <form id="register-form">
                        <div class="form-grid">
                            <div class="field">
                                <label for="name">姓名</label>
                                <input id="name" name="name" required>
                            </div>
                            <div class="field">
                                <label for="studentId">学号</label>
                                <input id="studentId" name="studentId" required>
                            </div>
                            <div class="field full">
                                <label for="college">学院</label>
                                <input id="college" name="college" value="计算机与人工智能学院" required>
                            </div>
                            <div class="field">
                                <label for="major">专业</label>
                                <input id="major" name="major" required>
                            </div>
                            <div class="field">
                                <label for="direction">方向</label>
                                <select id="direction" name="direction" required>
                                    <option value="">请选择方向</option>
                                    <option>人工智能</option>
                                    <option>Web 全栈</option>
                                    <option>软件工程</option>
                                    <option>网络安全</option>
                                </select>
                            </div>
                            <div class="field full">
                                <label for="email">邮箱</label>
                                <input id="email" name="email" type="email" required>
                            </div>
                            <div class="field">
                                <label for="registerPassword">密码</label>
                                <input id="registerPassword" name="password" type="password" required>
                            </div>
                            <div class="field">
                                <label for="confirmPassword">确认密码</label>
                                <input id="confirmPassword" name="confirmPassword" type="password" required>
                            </div>
                            <div class="field full">
                                <label for="bio">个人简介</label>
                                <textarea id="bio" name="bio" placeholder="介绍你的兴趣方向、擅长技能或项目想法"></textarea>
                            </div>
                        </div>
                        <div class="submit-row">
                            <button class="button button-primary" type="submit">创建账户</button>
                            <span id="register-status" class="status-note">注册后将自动跳转到账户中心。</span>
                        </div>
                    </form>
                </div>
            </section>
        </main>
    </div>
</body>
</html>
