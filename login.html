<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>登录 - PorSavor</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        :root {
            --primary: #2E7D32;
            --primary-light: #4CAF50;
            --primary-dark: #1B5E20;
            --accent: #FF6B35;
            --bg-light: #F5F7FA;
            --text-dark: #1A1A1A;
            --text-gray: #666666;
            --white: #FFFFFF;
            --shadow: 0 4px 20px rgba(0,0,0,0.08);
        }
        body { font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', sans-serif; background: var(--bg-light); color: var(--text-dark); min-height: 100vh; }

        .login-container {
            display: flex;
            min-height: 100vh;
        }
        .login-banner {
            flex: 1;
            background: linear-gradient(135deg, var(--primary-dark) 0%, var(--primary) 100%);
            position: relative;
            overflow: hidden;
        }
        .login-banner::before {
            content: '';
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: url('https://images.unsplash.com/photo-1464822759023-fed622ff2c3b?w=1920') center/cover;
            opacity: 0.3;
        }
        .banner-content {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            text-align: center;
            color: white;
            z-index: 1;
            width: 80%;
        }
        .banner-logo {
            font-size: 60px;
            margin-bottom: 20px;
        }
        .banner-title { font-size: 42px; font-weight: 700; margin-bottom: 15px; }
        .banner-desc { font-size: 18px; opacity: 0.9; line-height: 1.8; }

        .login-form-section {
            width: 500px;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 40px;
            background: var(--white);
        }
        .login-form-wrapper { width: 100%; max-width: 380px; }
        .form-logo {
            display: flex;
            align-items: center;
            gap: 10px;
            font-size: 28px;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 10px;
            text-decoration: none;
        }
        .form-title { font-size: 28px; font-weight: 700; margin-bottom: 8px; }
        .form-subtitle { color: var(--text-gray); margin-bottom: 35px; }

        .form-tabs {
            display: flex;
            gap: 30px;
            margin-bottom: 30px;
            border-bottom: 2px solid #eee;
        }
        .form-tab {
            padding: 15px 0;
            font-weight: 600;
            color: var(--text-gray);
            cursor: pointer;
            position: relative;
            transition: color 0.3s;
        }
        .form-tab.active { color: var(--primary); }
        .form-tab.active::after {
            content: '';
            position: absolute;
            bottom: -2px;
            left: 0;
            right: 0;
            height: 2px;
            background: var(--primary);
        }

        .form-group { margin-bottom: 20px; }
        .form-group label { display: block; font-weight: 500; margin-bottom: 8px; font-size: 14px; }
        .input-wrapper {
            position: relative;
        }
        .input-wrapper i {
            position: absolute;
            left: 15px;
            top: 50%;
            transform: translateY(-50%);
            color: var(--text-gray);
        }
        .form-input {
            width: 100%;
            padding: 15px 15px 15px 45px;
            border: 2px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            transition: all 0.3s;
        }
        .form-input:focus { outline: none; border-color: var(--primary); }
        .form-input::placeholder { color: #aaa; }

        .form-options {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 25px;
        }
        .remember-me { display: flex; align-items: center; gap: 8px; cursor: pointer; }
        .remember-me input { width: 18px; height: 18px; accent-color: var(--primary); }
        .forgot-link { color: var(--primary); text-decoration: none; font-size: 14px; }
        .forgot-link:hover { text-decoration: underline; }

        .btn {
            width: 100%;
            padding: 16px;
            border-radius: 12px;
            font-weight: 600;
            font-size: 16px;
            cursor: pointer;
            transition: all 0.3s;
            border: none;
        }
        .btn-primary { background: var(--primary); color: var(--white); }
        .btn-primary:hover { background: var(--primary-dark); transform: translateY(-2px); }

        .divider {
            display: flex;
            align-items: center;
            margin: 30px 0;
            color: var(--text-gray);
            font-size: 14px;
        }
        .divider::before, .divider::after {
            content: '';
            flex: 1;
            height: 1px;
            background: #eee;
        }
        .divider span { padding: 0 15px; }

        .social-login { display: flex; gap: 15px; }
        .social-btn {
            flex: 1;
            padding: 14px;
            border: 2px solid #eee;
            border-radius: 12px;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 10px;
            cursor: pointer;
            transition: all 0.3s;
            background: var(--white);
            font-size: 14px;
            font-weight: 500;
        }
        .social-btn:hover { border-color: var(--primary); background: #f8fff8; }
        .social-btn.wechat i { color: #07C160; }
        .social-btn.alipay i { color: #1677FF; }

        .register-link {
            text-align: center;
            margin-top: 30px;
            color: var(--text-gray);
        }
        .register-link a { color: var(--primary); text-decoration: none; font-weight: 600; }
        .register-link a:hover { text-decoration: underline; }

        .features-list {
            display: flex;
            justify-content: center;
            gap: 40px;
            margin-top: 50px;
        }
        .feature-item { text-align: center; }
        .feature-icon {
            width: 50px;
            height: 50px;
            background: rgba(255,255,255,0.2);
            border-radius: 50%;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 24px;
            margin: 0 auto 10px;
        }
        .feature-text { font-size: 14px; opacity: 0.9; }

        .toast {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 12px;
            color: white;
            font-weight: 500;
            z-index: 9999;
            animation: slideIn 0.3s ease;
        }
        .toast.success { background: var(--primary); }
        .toast.error { background: #f44336; }
        .toast.warning { background: #ff9800; }
        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @media (max-width: 900px) {
            .login-banner { display: none; }
            .login-form-section { width: 100%; }
        }
        @media (max-width: 480px) {
            .login-form-section { padding: 20px; }
            .social-login { flex-direction: column; }
        }
    </style>
</head>
<body>
    <div class="login-container">
        <div class="login-banner">
            <div class="banner-content">
                <div class="banner-logo">⛰️</div>
                <h1 class="banner-title">PorSavor</h1>
                <p class="banner-desc">探索山峰 征服自我<br>与志同道合的伙伴一起<br>开启您的登山之旅</p>
                <div class="features-list">
                    <div class="feature-item">
                        <div class="feature-icon">🏔️</div>
                        <div class="feature-text">山峰探索</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🥾</div>
                        <div class="feature-text">装备租借</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">👥</div>
                        <div class="feature-text">结伴同行</div>
                    </div>
                    <div class="feature-item">
                        <div class="feature-icon">🏆</div>
                        <div class="feature-text">徽章成就</div>
                    </div>
                </div>
            </div>
        </div>

        <div class="login-form-section">
            <div class="login-form-wrapper">
                <a href="index.html" class="form-logo">
                    <span>⛰️</span>
                    <span>MemSavor</span>
                </a>
                <h2 class="form-title">欢迎回来</h2>
                <p class="form-subtitle">登录您的账户，继续探索之旅</p>

                <div class="form-tabs">
                    <div class="form-tab active" onclick="switchTab('login')">登录</div>
                    <div class="form-tab" onclick="switchTab('register')">注册</div>
                </div>

                <form id="loginForm" onsubmit="handleLogin(event)">
                    <div class="form-group">
                        <label>手机号 / 邮箱</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-input" id="loginAccount" placeholder="请输入手机号或邮箱" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-input" id="loginPassword" placeholder="请输入密码" required>
                        </div>
                    </div>
                    <div class="form-options">
                        <label class="remember-me">
                            <input type="checkbox" id="rememberMe">
                            <span>记住我</span>
                        </label>
                        <a href="#" class="forgot-link" onclick="forgotPassword()">忘记密码？</a>
                    </div>
                    <button type="submit" class="btn btn-primary">登 录</button>
                </form>

                <form id="registerForm" style="display: none;" onsubmit="handleRegister(event)">
                    <div class="form-group">
                        <label>用户名</label>
                        <div class="input-wrapper">
                            <i class="fas fa-user"></i>
                            <input type="text" class="form-input" id="regName" placeholder="请输入用户名" required>
                        </div>
                    </div>
                    <div class="form-group">
                        <label>手机号</label>
                        <div class="input-wrapper">
                            <i class="fas fa-phone"></i>
                            <input type="tel" class="form-input" id="regPhone" placeholder="请输入手机号" required pattern="[0-9]{11}">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-input" id="regPassword" placeholder="请设置密码（至少6位）" required minlength="6">
                        </div>
                    </div>
                    <div class="form-group">
                        <label>确认密码</label>
                        <div class="input-wrapper">
                            <i class="fas fa-lock"></i>
                            <input type="password" class="form-input" id="regConfirmPassword" placeholder="请再次输入密码" required>
                        </div>
                    </div>
                    <button type="submit" class="btn btn-primary">注 册</button>
                </form>

                <div class="divider"><span>其他登录方式</span></div>

                <div class="social-login">
                    <button class="social-btn wechat" onclick="socialLogin('wechat')">
                        <i class="fab fa-weixin fa-lg"></i>
                        <span>微信登录</span>
                    </button>
                    <button class="social-btn alipay" onclick="socialLogin('alipay')">
                        <i class="fab fa-alipay fa-lg"></i>
                        <span>支付宝登录</span>
                    </button>
                </div>
            </div>
        </div>
    </div>

    <script src="js/api-static.js"></script>
    <script>
        function showToast(message, type = 'success') {
            const toast = document.createElement('div');
            toast.className = `toast ${type}`;
            toast.textContent = message;
            document.body.appendChild(toast);
            setTimeout(() => toast.remove(), 3000);
        }

        function switchTab(tab) {
            const tabs = document.querySelectorAll('.form-tab');
            const loginForm = document.getElementById('loginForm');
            const registerForm = document.getElementById('registerForm');
            
            tabs.forEach(t => t.classList.remove('active'));
            
            if (tab === 'login') {
                tabs[0].classList.add('active');
                loginForm.style.display = 'block';
                registerForm.style.display = 'none';
            } else {
                tabs[1].classList.add('active');
                loginForm.style.display = 'none';
                registerForm.style.display = 'block';
            }
        }

        async function handleLogin(e) {
            e.preventDefault();
            
            const account = document.getElementById('loginAccount').value.trim();
            const password = document.getElementById('loginPassword').value;
            const submitBtn = document.querySelector('#loginForm .btn-primary');
            
            if (!account || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '登录中...';
            
            try {
                const result = await api.login(account, password);
                if (result.success) {
                    showToast('登录成功！', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                showToast(error.message || '登录失败，请重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '登 录';
            }
        }

        async function handleRegister(e) {
            e.preventDefault();
            
            const name = document.getElementById('regName').value.trim();
            const phone = document.getElementById('regPhone').value.trim();
            const password = document.getElementById('regPassword').value;
            const confirmPassword = document.getElementById('regConfirmPassword').value;
            const submitBtn = document.querySelector('#registerForm .btn-primary');
            
            if (!name || !phone || !password) {
                showToast('请填写完整信息', 'error');
                return;
            }
            
            if (!/^1[3-9]\d{9}$/.test(phone)) {
                showToast('请输入正确的手机号', 'error');
                return;
            }
            
            if (password !== confirmPassword) {
                showToast('两次密码输入不一致', 'error');
                return;
            }
            
            if (password.length < 6) {
                showToast('密码至少需要6位', 'error');
                return;
            }
            
            submitBtn.disabled = true;
            submitBtn.textContent = '注册中...';
            
            try {
                const result = await api.register(name, phone, password);
                if (result.success) {
                    showToast('注册成功！', 'success');
                    setTimeout(() => {
                        window.location.href = 'index.html';
                    }, 1000);
                }
            } catch (error) {
                showToast(error.message || '注册失败，请重试', 'error');
            } finally {
                submitBtn.disabled = false;
                submitBtn.textContent = '注 册';
            }
        }

        function socialLogin(platform) {
            showToast(`${platform === 'wechat' ? '微信' : '支付宝'}登录功能开发中...`, 'warning');
        }

        function forgotPassword() {
            showToast('密码找回功能开发中，请联系客服', 'warning');
        }

        document.getElementById('loginAccount').addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                document.getElementById('loginForm').dispatchEvent(new Event('submit'));
            }
        });
    </script>
</body>
</html>
